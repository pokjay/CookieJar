services:
  backend:
    image: ghcr.io/pokjay/cookiejar-backend:${COOKIEJAR_TAG:-latest}
    env_file:
      - path: .env
        required: false
    # Port 8083 is not exposed externally — frontend proxies all /api/* requests.
    # Uncomment the lines below only for local API debugging:
    # ports:
    #   - "8083:8083"
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: ghcr.io/pokjay/cookiejar-frontend:${COOKIEJAR_TAG:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      BACKEND_URL: "http://backend:8083"
    ports:
      - "3001:3000"
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  internal:
    driver: bridge
